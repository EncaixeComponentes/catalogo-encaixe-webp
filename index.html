<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo de Fotos | Encaixe</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f4f6f9; color: #111; min-height: 100vh; }

    /* HEADER */
    header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark { width: 36px; height: 36px; background: #0B2D5B; color: #FFCC00; border-radius: 8px; display: grid; place-items: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .brand-name { font-size: 15px; font-weight: 600; color: #0B2D5B; }
    .brand-sub { font-size: 12px; color: #6b7280; margin-top: 1px; }
    #totalBadge { font-size: 13px; color: #6b7280; white-space: nowrap; }
    #totalBadge strong { color: #0B2D5B; }

    /* TOOLBAR */
    .toolbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 12px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 400px; }
    .search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 15px; pointer-events: none; }
    input[type=search] { width: 100%; height: 38px; border: 1px solid #d1d5db; border-radius: 8px; padding: 0 12px 0 36px; font-family: inherit; font-size: 13.5px; color: #111; outline: none; background: #fff; }
    input[type=search]:focus { border-color: #0B2D5B; }
    input[type=search]::placeholder { color: #9ca3af; }
    select { height: 38px; border: 1px solid #d1d5db; border-radius: 8px; padding: 0 12px; font-family: inherit; font-size: 13.5px; color: #374151; outline: none; background: #fff; cursor: pointer; }
    select:focus { border-color: #0B2D5B; }
    .btn-clear { height: 38px; padding: 0 14px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; color: #6b7280; font-family: inherit; font-size: 13px; cursor: pointer; }
    .btn-clear:hover { background: #f9fafb; }
    #countText { font-size: 13px; color: #6b7280; margin-left: auto; }
    #countText strong { color: #111; }

    /* LAYOUT */
    .layout { display: flex; gap: 0; max-width: 1400px; margin: 0 auto; }

    /* SIDEBAR */
    .sidebar { width: 210px; flex-shrink: 0; background: #fff; border-right: 1px solid #e5e7eb; min-height: calc(100vh - 113px); padding: 16px 12px; }
    .sidebar-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: #9ca3af; margin-bottom: 8px; padding: 0 4px; }
    .cat-btn { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; border-radius: 7px; border: none; background: transparent; font-family: inherit; font-size: 13px; color: #374151; cursor: pointer; text-align: left; }
    .cat-btn:hover { background: #f3f4f6; }
    .cat-btn.active { background: #eff4ff; color: #0B2D5B; font-weight: 600; }
    .cat-count { font-size: 12px; color: #9ca3af; }
    .cat-btn.active .cat-count { color: #3b82f6; }

    /* CONTENT */
    .content { flex: 1; padding: 20px; min-width: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }

    /* CARD */
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; transition: box-shadow .15s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .photo-box { height: 180px; background: #f9fafb; display: flex; align-items: center; justify-content: center; padding: 12px; }
    .photo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .img-fallback { display: none; flex-direction: column; align-items: center; gap: 6px; color: #9ca3af; font-size: 12px; text-align: center; }
    .card-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; border-top: 1px solid #f3f4f6; }
    .prod-name { font-size: 13px; font-weight: 500; line-height: 1.35; color: #111; }
    .cat-tag { display: inline-block; font-size: 11px; background: #eff4ff; color: #2563eb; padding: 2px 8px; border-radius: 999px; font-weight: 500; align-self: flex-start; }
    .card-actions { display: grid; gap: 6px; margin-top: auto; padding-top: 4px; }
    .btn-dl { display: flex; align-items: center; justify-content: center; gap: 6px; height: 34px; border-radius: 7px; font-family: inherit; font-size: 12.5px; font-weight: 600; text-decoration: none; }
    .btn-dl.primary { background: #0B2D5B; color: #fff; }
    .btn-dl.primary:hover { background: #163D73; }
    .btn-dl.secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }
    .btn-dl.secondary:hover { background: #f9fafb; }

    /* STATES */
    .empty { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 80px 20px; color: #9ca3af; font-size: 14px; text-align: center; }
    .skeleton { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    .sk-img { height: 180px; background: linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%); background-size:200% 100%; animation: sk 1.4s infinite; }
    .sk-body { padding: 12px; display: grid; gap: 8px; }
    .sk-line { height: 11px; border-radius: 4px; background: linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%); background-size:200% 100%; animation: sk 1.4s infinite; }
    .sk-line.s { width: 55%; }
    @keyframes sk { from{background-position:200% 0} to{background-position:-200% 0} }

    footer { text-align: center; padding: 24px; color: #9ca3af; font-size: 12px; border-top: 1px solid #e5e7eb; }

    @media (max-width: 860px) {
      .sidebar { display: none; }
      .toolbar { gap: 8px; }
      #countText { width: 100%; margin-left: 0; }
    }
    @media (max-width: 540px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .content { padding: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">E</div>
    <div>
      <div class="brand-name">Encaixe Componentes</div>
      <div class="brand-sub">Catálogo de Fotos</div>
    </div>
  </div>
  <div id="totalBadge">Carregando...</div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-ico">⌕</span>
    <input id="searchInput" type="search" placeholder="Buscar produto ou categoria..." autocomplete="off" />
  </div>
  <select id="categorySelect"><option value="">Todas as categorias</option></select>
  <button class="btn-clear" id="clearBtn" type="button">Limpar</button>
  <span id="countText"></span>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">Categorias</div>
    <div id="catList"></div>
  </aside>
  <div class="content">
    <div id="loadingGrid" class="grid">
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line s"></div></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line s"></div></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line s"></div></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line s"></div></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line s"></div></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line s"></div></div></div>
    </div>
    <div id="catalog" class="grid" style="display:none;"></div>
    <div id="emptyState" class="empty">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Nenhum produto encontrado</span>
    </div>
  </div>
</div>

<footer>Catálogo interno Encaixe · Atualizado automaticamente via Google Sheets</footer>

<script>
(function(){
  const CSV = "/api/produtos";
  let products = [], activeCat = "", timer = null;
  const $=id=>document.getElementById(id);
  const catalogEl=$("catalog"), loadingEl=$("loadingGrid"), emptyEl=$("emptyState"),
        searchEl=$("searchInput"), selectEl=$("categorySelect"),
        countEl=$("countText"), totalEl=$("totalBadge"),
        clearBtn=$("clearBtn"), catList=$("catList");

  function norm(v){return String(v??"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();}
  function esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function driveId(u){const s=String(u??"");let m=s.match(/\/d\/([^/?#]+)/);if(m)return m[1];m=s.match(/[?&]id=([^&]+)/);return m?m[1]:"";}
  function imgUrl(p){const id=driveId(p.foto)||driveId(p.download);return id?`/api/imagem?id=${encodeURIComponent(id)}&w=600`:p.foto;}
  function viewUrl(p){const id=driveId(p.foto)||driveId(p.download);return id?`https://drive.google.com/file/d/${id}/view`:p.foto;}
  function dlUrl(p){const id=driveId(p.foto)||driveId(p.download);return id?`https://drive.google.com/uc?export=download&id=${id}`:(p.download||p.foto);}

  function parseCSV(t){const rows=[];let row=[],val="",q=false;for(let i=0;i<t.length;i++){const c=t[i],n=t[i+1];if(c==='"'&&q&&n==='"'){val+='"';i++;}else if(c==='"'){q=!q;}else if(c===','&&!q){row.push(val);val="";}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(val);rows.push(row);row=[];val="";}else val+=c;}if(val||row.length){row.push(val);rows.push(row);}return rows.filter(r=>r.some(c=>c.trim()!=""));}

  function catCounts(){const m=new Map();products.forEach(p=>m.set(p.categoria,(m.get(p.categoria)||0)+1));return[...m.entries()].sort((a,b)=>a[0].localeCompare(b[0],"pt-BR"));}

  function buildUI(){
    const cats=catCounts();
    selectEl.innerHTML='<option value="">Todas as categorias</option>'+cats.map(([c,n])=>`<option value="${esc(c)}">${esc(c)} (${n})</option>`).join("");
    catList.innerHTML=`<button class="cat-btn ${!activeCat?'active':''}" data-cat=""><span>Todas</span><span class="cat-count">${products.length}</span></button>`+cats.map(([c,n])=>`<button class="cat-btn ${activeCat===c?'active':''}" data-cat="${esc(c)}"><span>${esc(c)}</span><span class="cat-count">${n}</span></button>`).join("");
  }

  function setCat(cat){activeCat=cat??"";selectEl.value=activeCat;buildUI();render();}

  function render(){
    const term=norm(searchEl.value);
    const list=products.filter(p=>(!activeCat||p.categoria===activeCat)&&(!term||norm(p.produto).includes(term)||norm(p.categoria).includes(term)));
    countEl.innerHTML=`<strong>${list.length.toLocaleString("pt-BR")}</strong> de ${products.length.toLocaleString("pt-BR")} produtos`;
    if(!list.length){catalogEl.style.display="none";emptyEl.style.display="flex";return;}
    emptyEl.style.display="none";catalogEl.style.display="grid";
    catalogEl.innerHTML=list.map(p=>`
      <article class="card">
        <div class="photo-box">
          <img src="${esc(imgUrl(p))}" alt="${esc(p.produto)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
          <div class="img-fallback">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            Sem imagem
          </div>
        </div>
        <div class="card-body">
          <div class="prod-name">${esc(p.produto)}</div>
          <div class="cat-tag">${esc(p.categoria)}</div>
          <div class="card-actions">
            <a class="btn-dl primary" href="${esc(dlUrl(p))}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Baixar
            </a>
            <a class="btn-dl secondary" href="${esc(viewUrl(p))}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              Visualizar
            </a>
          </div>
        </div>
      </article>`).join("");
  }

  function debounce(fn){clearTimeout(timer);timer=setTimeout(fn,180);}

  async function load(){
    try{
      const res=await fetch(CSV+"?t="+Date.now());
      if(!res.ok)throw new Error("HTTP "+res.status);
      const text=await res.text();
      const rows=parseCSV(text);
      const headers=rows.shift().map(h=>norm(h));
      const idx={produto:headers.findIndex(h=>h==="produto"),categoria:headers.findIndex(h=>h==="categoria"),foto:headers.findIndex(h=>h.includes("link da foto")||h==="foto"),download:headers.findIndex(h=>h.includes("link de download")||h==="download")};
      products=rows.map(r=>({produto:(r[idx.produto]??"").trim(),categoria:(r[idx.categoria]??"").trim(),foto:(r[idx.foto]??"").trim(),download:(r[idx.download]??"").trim()})).filter(p=>p.produto&&(p.foto||p.download));
      totalEl.innerHTML=`<strong>${products.length.toLocaleString("pt-BR")}</strong> produtos`;
      buildUI();loadingEl.style.display="none";render();
    }catch(e){
      console.error(e);
      loadingEl.style.display="none";
      totalEl.textContent="Erro ao carregar";
      emptyEl.style.display="flex";
      emptyEl.querySelector("span").textContent="Erro ao carregar. Verifique /api/produtos.";
    }
  }

  searchEl.addEventListener("input",()=>debounce(render));
  selectEl.addEventListener("change",e=>setCat(e.target.value));
  clearBtn.addEventListener("click",()=>{searchEl.value="";setCat("");});
  catList.addEventListener("click",e=>{const b=e.target.closest(".cat-btn");if(b)setCat(b.dataset.cat??"");});
  load();
})();
</script>
</body>
</html>
